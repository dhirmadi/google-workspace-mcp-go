name: Bug report
description: Report incorrect behavior, crashes, or failed Google API calls
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. Please include enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Steps, tool name (if MCP), request shape, and transport (stdio vs HTTP).
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior / errors
      description: Paste logs, HTTP status, or Google API error payloads (redact tokens).
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Image tag, git SHA, or release if known
    validations:
      required: false
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Go version, Docker, enabled services or TOOL_TIER, single-user mode, etc.
    validations:
      required: false
